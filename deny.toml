# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Vulnerability database (RustSec)
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # rsa crate Marvin Attack (timing sidechannel). No upstream fix.
    # jsonwebtoken uses rsa for JWK decoding; NORA only verifies signatures.
    # Also transitive via pgp (rpgp): index signing is Ed25519-only, so no
    # rsa private-key operation is ever performed there either.
    "RUSTSEC-2023-0071",
    # quick-xml <0.41 DoS (quadratic-attr + NsReader memory-exhaustion).
    # Transitive via object_store (S3 XML parsing); no upstream fix yet
    # (object_store 0.14 still pins quick-xml <0.41). Low exposure: XML comes
    # from the configured S3 backend, not attacker input. Remove when
    # object_store ships quick-xml >=0.41. Tracking: #799
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
unused-allowed-license = "allow"
# Allowed open-source licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "CDLA-Permissive-2.0",   # webpki-roots (CA certificates bundle)
    "MPL-2.0",
    "NCSA",  # libfuzzer-sys (LLVM fuzzer)
]

[bans]
multiple-versions = "warn"
deny = [
    { name = "openssl-sys" },
    { name = "openssl" },
]
skip = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
