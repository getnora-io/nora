name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
  - type: input
    id: version
    attributes:
      label: NORA version
      placeholder: "0.2.32"
  - type: dropdown
    id: protocol
    attributes:
      label: Registry protocol
      options:
        - Docker
        - npm
        - Maven
        - PyPI
        - Cargo
        - Raw
        - UI/Dashboard
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
